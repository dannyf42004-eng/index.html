<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>進化紀元：20代 終極優勢版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; user-select: none; touch-action: none; }
        
        body, html { 
            background: #000; width: 100%; height: 100%; overflow: hidden; position: fixed; 
            font-family: 'PingFang TC', sans-serif; 
        }

        #bgContainer { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .bgLayer { 
            position: absolute; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            transition: opacity 1.5s ease; opacity: 0;
        }
        .bgLayer.active { opacity: 1; }

        #mainStage { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; z-index: 100; }

        #topBar { 
            padding: env(safe-area-inset-top) 15px 10px 15px; 
            background: rgba(0,0,0,0.85); 
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000; 
        }

        .infoText { color: #ffd700; font-weight: bold; font-size: 16px; }
        .btn {
            background: #4a90e2; color: #fff; border: 2px solid #fff;
            padding: 6px 12px; border-radius: 15px; font-size: 12px; font-weight: bold;
        }

        #viewport { flex: 1; position: relative; overflow: hidden; z-index: 100; }
        
        .base { position: absolute; bottom: 22%; width: 140px; display: flex; flex-direction: column; align-items: center; z-index: 50; }
        #playerBase { left: 10px; }
        #enemyBase { right: 10px; }

        .unit { position: absolute; bottom: 22%; width: 60px; display: flex; flex-direction: column; align-items: center; z-index: 150; }
        .hpBar { width: 40px; height: 6px; background: #000; border: 1px solid #fff; border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
        .hpFill { height: 100%; transition: width 0.1s; }

        #bottomBar { 
            background: rgba(20, 20, 20, 0.98); height: 135px; 
            padding-bottom: env(safe-area-inset-bottom);
            display: flex; align-items: center;
            border-top: 3px solid #ffd700; z-index: 2000;
            overflow-x: auto; 
        }
        
        #unitRow { display: flex; gap: 12px; padding: 0 20px; }
        .unitCard { 
            min-width: 85px; height: 105px; background: #333; border: 2px solid #ffd700; 
            border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .costTag {
            margin-top: 6px; background: #ffd700; color: #000; 
            font-size: 11px; font-weight: 900; padding: 2px 8px; border-radius: 8px;
        }

        #startMenu {
            position: absolute; width: 100%; height: 100%; z-index: 5000;
            background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="bgContainer">
    <div id="bg_primary" class="bgLayer active" style="background: linear-gradient(to bottom, #4a5d23, #000);"></div>
    <div id="bg_secondary" class="bgLayer"></div>
</div>

<div id="mainStage">
    <div id="startMenu">
        <h1 style="color: #ffd700; font-size: 32px; margin-bottom: 30px; text-shadow: 0 0 15px #f1c40f;">進化紀元：終極主宰</h1>
        <button class="btn" style="padding: 18px 60px; font-size: 22px; border-radius: 40px;" onclick="initGame()">啟動文明</button>
    </div>

    <div id="gameContainer" style="display: none; flex: 1; flex-direction: column;">
        <div id="topBar">
            <div class="infoText">🪙 <span id="goldDisp">500</span></div>
            <div id="eraTitle" style="color:#fff; font-size:14px; font-weight:bold;">石器時代</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" id="speedBtn" onclick="toggleSpeed()">1x</button>
                <button class="btn" style="background:#e67e22;" onclick="playerEvolve()">進化(<span id="evolveCost">5000</span>)</button>
            </div>
        </div>

        <div id="viewport">
            <div id="battlefield">
                <div id="playerBase" class="base">
                    <div class="hpBar" style="width:100px;"><div id="pHpFill" style="background:#2ecc71; width:100%;" class="hpFill"></div></div>
                    <div id="pBaseIcon" style="font-size:80px;">🛖</div>
                </div>
                <div id="enemyBase" class="base">
                    <div class="hpBar" style="width:100px;"><div id="eHpFill" style="background:#e74c3c; width:100%;" class="hpFill"></div></div>
                    <div id="eBaseIcon" style="font-size:80px;">🧱</div>
                </div>
            </div>
        </div>

        <div id="bottomBar"><div id="unitRow"></div></div>
    </div>
</div>

<script>
    const CONFIG = { 
        baseHp: 50000, 
        evolveBase: 5000, 
        evolveMult: 1.5, 
        pIncome: 500, 
        eIncome: 200, 
        collisionRange: 60, 
        baseStopRange: 145,
        pCostMult: 0.8, // 我方成本打 8 折
        eHpMult: 0.8    // 敵方血量打 8 折
    };

    const ERAS = [
        { name: "石器時代", icon: "🛖", bg: "#4a5d23", units: [{i:"🦴",h:400,d:100,c:50}, {i:"🪨",h:1000,d:220,c:300}] },
        { name: "青銅時代", icon: "🏺", bg: "#8b4513", units: [{i:"🔱",h:1500,d:400,c:800}, {i:"🐎",h:3800,d:650,c:2000}] },
        { name: "鐵器時代", icon: "⚔️", bg: "#555555", units: [{i:"🤺",h:5500,d:1000,c:4500}, {i:"🛡️",h:13000,d:1400,c:9000}] },
        { name: "中世紀時代", icon: "🏰", bg: "#2c3e50", units: [{i:"🏹",h:20000,d:2800,c:15000}, {i:"⚔️",h:45000,d:4500,c:35000}] },
        { name: "文藝復興", icon: "🎨", bg: "#d4af37", units: [{i:"🔫",h:65000,d:7500,c:60000}, {i:"💣",h:110000,d:13000,c:90000}] },
        { name: "工業時代", icon: "🏭", bg: "#7f8c8d", units: [{i:"🚂",h:160000,d:22000,c:130000}, {i:"⚙️",h:260000,d:38000,c:250000}] },
        { name: "電力時代", icon: "💡", bg: "#f1c40f", units: [{i:"⚡",h:450000,d:65000,c:400000}, {i:"🔋",h:750000,d:95000,c:600000}] },
        { name: "原子時代", icon: "⚛️", bg: "#2ecc71", units: [{i:"🧪",h:1100000,d:160000,c:900000}, {i:"☢️",h:2000000,d:280000,c:1500000}] },
        { name: "資訊時代", icon: "💻", bg: "#3498db", units: [{i:"📡",h:3200000,d:480000,c:2800000}, {i:"💾",h:5800000,d:850000,c:4500000}] },
        { name: "太空時代", icon: "🚀", bg: "#1a1a2e", units: [{i:"👨‍🚀",h:8500000,d:1300000,c:7500000}, {i:"🛸",h:16000000,d:2800000,c:13500000}] },
        { name: "數位時代", icon: "🌐", bg: "#00d2ff", units: [{i:"👾",h:28000000,d:4500000,c:22000000}, {i:"💠",h:48000000,d:7500000,c:38000000}] },
        { name: "生化時代", icon: "🧬", bg: "#a8e063", units: [{i:"🧬",h:85000000,d:13000000,c:65000000}, {i:"🦠",h:150000000,d:24000000,c:120000000}] },
        { name: "量子時代", icon: "🌀", bg: "#6a11cb", units: [{i:"⚛️",h:350000000,d:48000000,c:280000000}, {i:"🌌",h:600000000,d:85000000,c:500000000}] },
        { name: "奈米時代", icon: "🐜", bg: "#232526", units: [{i:"🤖",h:1100000000,d:160000000,c:850000000}, {i:"🐝",h:2000000000,d:300000000,c:1500000000}] },
        { name: "光速時代", icon: "✨", bg: "#fffbd5", units: [{i:"🕯️",h:3800000000,d:580000000,c:3000000000}, {i:"☀️",h:7000000000,d:980000000,c:5000000000}] },
        { name: "恆星時代", icon: "☀️", bg: "#ff4b1f", units: [{i:"🔥",h:13000000000,d:2000000000,c:10000000000}, {i:"💥",h:25000000000,d:3500000000,c:18000000000}] },
        { name: "銀河時代", icon: "🌌", bg: "#1e3c72", units: [{i:"🪐",h:50000000000,d:7000000000,c:40000000000}, {i:"🌀",h:90000000000,d:12000000000,c:70000000000}] },
        { name: "星系時代", icon: "🌑", bg: "#000000", units: [{i:"☄️",h:200000000000,d:28000000000,c:150000000000}, {i:"🕳️",h:400000000000,d:50000000000,c:300000000000}] },
        { name: "維度時代", icon: "📐", bg: "#8e2de2", units: [{i:"🧿",h:900000000000,d:120000000000,c:700000000000}, {i:"🔮",h:1800000000000,d:250000000000,c:1400000000000}] },
        { name: "造物者時代", icon: "👁️", bg: "#f8ff00", units: [{i:"👼",h:5000000000000,d:600000000000,c:3500000000000}, {i:"👑",h:9999999999999,d:999999999999,c:8000000000000}] }
    ];

    let state = { gold: 500, eGold: 1000, pHp: CONFIG.baseHp, eHp: CONFIG.baseHp, pEra: 0, eEra: 0, pUnits: [], eUnits: [], isRunning: false, gameSpeed: 1, currentBgIdx: -1 };
    let loops = {};

    function initGame() {
        document.getElementById('startMenu').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'flex';
        state.isRunning = true;
        updateBackground();
        startLoops();
        updateUI();
    }

    function toggleSpeed() {
        state.gameSpeed = state.gameSpeed === 1 ? 2 : (state.gameSpeed === 2 ? 4 : 1);
        document.getElementById('speedBtn').innerText = `${state.gameSpeed}x`;
    }

    function startLoops() {
        clearInterval(loops.game); clearInterval(loops.income); clearInterval(loops.ai);
        loops.game = setInterval(update, 1000 / 60);
        loops.income = setInterval(() => { 
            if(!state.isRunning) return; 
            state.gold += (CONFIG.pIncome * state.gameSpeed); 
            state.eGold += (CONFIG.eIncome * state.gameSpeed); 
            updateUI(); 
        }, 1000);
        loops.ai = setInterval(enemyAI, 1500 / state.gameSpeed); 
    }

    function enemyAI() {
        if(!state.isRunning) return;
        const era = ERAS[state.eEra];
        const nextCost = Math.floor(CONFIG.evolveBase * Math.pow(CONFIG.evolveMult, state.eEra));
        if (state.eGold >= (nextCost * 0.85)) {
            if (state.eGold >= era.units[1].c) spawn(false, 1);
        } else if (state.eGold >= era.units[0].c) {
            spawn(false, 0);
        }
        if (state.eGold >= nextCost && state.eEra < ERAS.length - 1) { state.eEra++; updateBackground(); }
    }

    function update() {
        if (!state.isRunning) return;
        const screenW = window.innerWidth;
        const speedMult = state.gameSpeed;

        [state.pUnits, state.eUnits].forEach((units, i) => {
            const isP = i === 0;
            const enemies = isP ? state.eUnits : state.pUnits;
            const stopLine = isP ? screenW - CONFIG.baseStopRange : CONFIG.baseStopRange;

            units.forEach(u => {
                let target = enemies.find(e => Math.abs(u.pos - e.pos) < CONFIG.collisionRange);
                if (target) {
                    target.hp -= (u.dmg / 60 * speedMult);
                    u.el.style.transform = `translateX(${isP?8:-8}px) scale(1.1)`;
                } else if ((isP && u.pos >= stopLine) || (!isP && u.pos <= stopLine)) {
                    u.pos = stopLine;
                    if(isP) state.eHp -= (u.dmg / 60 * speedMult); else state.pHp -= (u.dmg / 60 * speedMult);
                    u.el.style.transform = `translateX(${isP?8:-8}px) scale(1.1)`;
                } else {
                    u.pos += (isP ? 2.5 : -2.5) * speedMult;
                    u.el.style.transform = `translateX(0px)`;
                }
                u.el.style.left = u.pos + 'px';
                if(u.hpEl) u.hpEl.style.width = Math.max(0, (u.hp / u.maxHp * 100)) + '%';
            });
        });

        state.eUnits = state.eUnits.filter(u => { if (u.hp <= 0) { state.gold += (u.cost * 0.5); u.el.remove(); return false; } return true; });
        state.pUnits = state.pUnits.filter(u => { if (u.hp <= 0) { u.el.remove(); return false; } return true; });
        
        document.getElementById('pHpFill').style.width = Math.max(0, (state.pHp / CONFIG.baseHp * 100)) + '%';
        document.getElementById('eHpFill').style.width = Math.max(0, (state.eHp / CONFIG.baseHp * 100)) + '%';

        if (state.pHp <= 0 || state.eHp <= 0) {
            state.isRunning = false;
            alert(state.pHp <= 0 ? "文明熄滅了..." : "無人能擋！你已統一所有時代！");
            location.reload();
        }
    }

    function spawn(isP, idx) {
        const era = ERAS[isP ? state.pEra : state.eEra];
        const data = era.units[idx];
        
        // 我方成本打 8 折邏輯
        const finalCost = isP ? Math.floor(data.c * CONFIG.pCostMult) : data.c;
        if (isP && state.gold < finalCost) return;
        if (isP) state.gold -= finalCost;

        // 敵方血量打 8 折邏輯
        const finalHp = isP ? data.h : (data.h * CONFIG.eHpMult);
        
        const el = document.createElement('div');
        el.className = 'unit';
        el.innerHTML = `<div class="hpBar"><div class="hpFill" style="background:${isP?'#2ecc71':'#e74c3c'}; width:100%;"></div></div><div style="font-size:45px;">${data.i}</div>`;
        document.getElementById('battlefield').appendChild(el);

        const unit = { el, hpEl: el.querySelector('.hpFill'), pos: isP ? 130 : window.innerWidth - 130, hp: finalHp, maxHp: finalHp, dmg: data.d, cost: data.c };
        if (isP) state.pUnits.push(unit); else state.eUnits.push(unit);
        updateUI();
    }

    function playerEvolve() {
        let cost = Math.floor(CONFIG.evolveBase * Math.pow(CONFIG.evolveMult, state.pEra));
        if (state.gold >= cost && state.pEra < ERAS.length - 1) {
            state.gold -= cost; state.pEra++; updateUI(); updateBackground();
        }
    }

    function updateBackground() {
        const highestEra = Math.max(state.pEra, state.eEra);
        if (state.currentBgIdx === highestEra) return;
        state.currentBgIdx = highestEra;
        const pBg = document.getElementById('bg_primary');
        const sBg = document.getElementById('bg_secondary');
        const era = ERAS[highestEra];
        const style = `linear-gradient(to bottom, ${era.bg}, #000)`;
        if (pBg.classList.contains('active')) {
            sBg.style.background = style; sBg.classList.add('active'); pBg.classList.remove('active');
        } else {
            pBg.style.background = style; pBg.classList.add('active'); sBg.classList.remove('active');
        }
        document.getElementById('eraTitle').innerText = era.name;
    }

    function updateUI() {
        document.getElementById('goldDisp').innerText = Math.floor(state.gold);
        const nextCost = Math.floor(CONFIG.evolveBase * Math.pow(CONFIG.evolveMult, state.pEra));
        document.getElementById('evolveCost').innerText = nextCost > 1000000 ? (nextCost/1000000).toFixed(1)+'M' : nextCost;
        document.getElementById('pBaseIcon').innerText = ERAS[state.pEra].icon;
        document.getElementById('eBaseIcon').innerText = ERAS[state.eEra].icon;
        
        const row = document.getElementById('unitRow'); row.innerHTML = '';
        ERAS[state.pEra].units.forEach((u, i) => {
            const card = document.createElement('div'); card.className = 'unitCard'; card.onclick = () => spawn(true, i);
            // 顯示打 8 折後的我方成本
            const discountedCost = Math.floor(u.c * CONFIG.pCostMult);
            card.innerHTML = `<span style="font-size:32px">${u.i}</span><div class="costTag">💰 ${discountedCost}</div>`;
            row.appendChild(card);
        });
    }
</script>
</body>
</html>
