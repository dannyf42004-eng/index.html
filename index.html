<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>進化紀元：極致穩定版</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-touch-callout: none; -webkit-user-select: none;
            user-select: none; touch-action: none;
        }

        body, html {
            background: #222; width: 100%; height: 100%;
            overflow: hidden; position: fixed;
            font-family: 'PingFang TC', sans-serif;
        }

        /* 主舞台 - 處理翻轉縮放 */
        #mainStage {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 摩登原始人主頁面 */
        #startMenu {
            position: absolute; width: 100%; height: 100%; z-index: 1000;
            background: linear-gradient(to bottom, #4facfe, #00f2fe);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .stoneBtn {
            padding: 15px 50px; font-size: 24px; background: #d2b48c;
            color: #5d4037; border: 4px solid #8b4513; border-radius: 12px;
            box-shadow: 0 8px 0 #5d4037; font-weight: bold; cursor: pointer;
        }

        /* 遊戲背景 */
        #gameBg {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1s; z-index: 1; filter: brightness(0.7);
        }

        /* 戰鬥介面 */
        #gameContainer {
            position: relative; flex: 1; display: none; flex-direction: column; z-index: 10;
        }

        #topBar {
            padding: env(safe-area-inset-top) 15px 10px 15px;
            background: rgba(0,0,0,0.7); display: flex; justify-content: space-between; align-items: center;
        }

        .speedLabel { background: #444; padding: 5px 10px; border-radius: 5px; font-size: 12px; }

        /* 戰場區域 */
        #viewport { flex: 1; position: relative; overflow: hidden; }
        .base { position: absolute; bottom: 25%; width: 100px; display: flex; flex-direction: column; align-items: center; }
        .unit { position: absolute; bottom: 25%; width: 50px; display: flex; flex-direction: column; align-items: center; z-index: 20; }

        /* 底部選單 */
        #bottomBar {
            background: rgba(30, 20, 10, 0.95); height: 120px;
            padding-bottom: env(safe-area-inset-bottom);
            display: flex; justify-content: center; align-items: center;
            border-top: 4px solid #8b4513;
        }
        #unitRow { display: flex; gap: 12px; }
        .unitCard {
            width: 80px; height: 90px; background: #d2b48c; border: 2px solid #8b4513;
            border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="mainStage">
    <div id="startMenu">
        <h1 style="font-size: 48px; color: #fff; text-shadow: 3px 3px #8b4513; margin-bottom: 30px;">進化紀元</h1>
        <button class="stoneBtn" onclick="initGame()">開始戰鬥</button>
    </div>

    <div id="gameBg"></div>

    <div id="gameContainer">
        <div id="topBar">
            <div style="color:#ffd700; font-weight:bold;">🪙 <span id="goldDisp">500</span></div>
            <div style="display:flex; gap:10px; align-items:center;">
                <div class="speedLabel" id="progressDisp">時代: 1</div>
                <select id="speedSelect" onchange="setSpeed(this.value)" style="background:#333; color:#fff; border:none; padding:2px 5px; border-radius:4px;">
                    <option value="1">1x 速度</option>
                    <option value="2">2x 速度</option>
                    <option value="5">5x 速度</option>
                    <option value="10">10x 速度</option>
                </select>
            </div>
            <button onclick="playerEvolve()" id="evolveBtn" style="background:#e67e22; border:none; padding:6px 12px; border-radius:8px; color:#fff; font-size:12px;">晉升時代</button>
        </div>

        <div id="viewport">
            <div id="battlefield">
                <div id="playerBase" class="base" style="left: 20px;">
                    <div style="width:80px; height:8px; background:#222; margin-bottom:5px; border-radius:4px; overflow:hidden;"><div id="pHpFill" style="height:100%; width:100%; background:#2ecc71;"></div></div>
                    <div id="pBaseIcon" style="font-size:60px;">🛖</div>
                </div>
                <div id="enemyBase" class="base" style="right: 20px;">
                    <div style="width:80px; height:8px; background:#222; margin-bottom:5px; border-radius:4px; overflow:hidden;"><div id="eHpFill" style="height:100%; width:100%; background:#e74c3c;"></div></div>
                    <div id="eBaseIcon" style="font-size:60px;">🧱</div>
                </div>
            </div>
        </div>

        <div id="bottomBar"><div id="unitRow"></div></div>
    </div>
</div>

<script>
    const CONFIG = { baseHp: 5000, evolveBase: 5000, killReward: 0.8 };
    const ERAS = [
        { name: "石器", bg: "url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1200')", base: "🛖", units: [{cost:50, icon:"🦴", hp:150, dmg:50}, {cost:200, icon:"🪨", hp:400, dmg:90}] },
        { name: "青銅", bg: "url('https://images.unsplash.com/photo-1599733589046-10c005739ef0?w=1200')", base: "🏺", units: [{cost:600, icon:"🔱", hp:1400, dmg:220}, {cost:1500, icon:"🐎", hp:3000, dmg:500}] },
        { name: "鐵器", bg: "url('https://images.unsplash.com/photo-1444491741275-3747c53c99b4?w=1200')", base: "🛡️", units: [{cost:4000, icon:"🗡️", hp:6000, dmg:1300}, {cost:9000, icon:"🏹", hp:13000, dmg:2600}] },
        { name: "中古", bg: "url('https://images.unsplash.com/photo-1533154683836-84ea7a0bc310?w=1200')", base: "🏰", units: [{cost:15000, icon:"⚔️", hp:25000, dmg:4500}, {cost:30000, icon:"🔥", hp:45000, dmg:8000}] },
        { name: "文藝", bg: "url('https://images.unsplash.com/photo-1563387852576-964ad31b73af?w=1200')", base: "🕍", units: [{cost:50000, icon:"🤺", hp:80000, dmg:15000}, {cost:120000, icon:"🛶", hp:150000, dmg:35000}] },
        { name: "工業", bg: "url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=1200')", base: "🏭", units: [{cost:250000, icon:"💂", hp:350000, dmg:80000}, {cost:600000, icon:"🚂", hp:800000, dmg:150000}] }
    ];

    let state = {
        gold: 500, eGold: 1000, pHp: 5000, eHp: 5000,
        pEra: 0, eEra: 0, pUnits: [], eUnits: [],
        speed: 1, isRunning: false
    };

    let loops = {};

    // 螢幕翻轉校正邏輯
    window.addEventListener('resize', calibrateLayout);
    window.addEventListener('orientationchange', () => setTimeout(calibrateLayout, 300));

    function calibrateLayout() {
        if (!state.isRunning) return;
        const screenW = window.innerWidth;
        // 同步所有單位的位置比例，防止翻轉後消失
        state.pUnits.forEach(u => { if(u.pos > screenW) u.pos = screenW - 100; });
        state.eUnits.forEach(u => { if(u.pos > screenW) u.pos = screenW - 150; });
    }

    function initGame() {
        state.gold = 500; state.pHp = CONFIG.baseHp; state.eHp = CONFIG.baseHp;
        state.pEra = 0; state.eEra = 0;
        document.getElementById('startMenu').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'flex';
        document.getElementById('gameBg').style.opacity = '1';
        state.isRunning = true;
        updateBackground();
        startLoops();
        updateUI();
    }

    function startLoops() {
        clearInterval(loops.game); clearInterval(loops.ai);
        loops.game = setInterval(update, 1000 / (60 * state.speed));
        loops.ai = setInterval(enemyAI, 2400 / state.speed);
    }

    function update() {
        if (!state.isRunning) return;
        const screenW = window.innerWidth;

        [state.pUnits, state.eUnits].forEach((units, i) => {
            const isP = i === 0;
            const enemies = isP ? state.eUnits : state.pUnits;
            const enemyBaseX = isP ? screenW - 100 : 100;

            units.forEach(u => {
                let target = enemies.find(e => Math.abs(u.pos - e.pos) < 55);
                if (target) {
                    target.hp -= (u.dmg / 60);
                } else if ((isP && u.pos >= enemyBaseX) || (!isP && u.pos <= enemyBaseX)) {
                    if(isP) state.eHp -= (u.dmg / 60); else state.pHp -= (u.dmg / 60);
                } else {
                    u.pos += (isP ? 2.5 : -2.5);
                }
                u.el.style.left = u.pos + 'px';
                u.hpEl.style.width = (u.hp / u.maxHp * 100) + '%';
            });
        });

        // 擊殺獎勵
        state.eUnits = state.eUnits.filter(u => {
            if (u.hp <= 0) { state.gold += (u.cost * CONFIG.killReward); u.el.remove(); updateUI(); return false; }
            return true;
        });
        state.pUnits = state.pUnits.filter(u => { if(u.hp <= 0) { u.el.remove(); return false; } return true; });

        updateHealth();
    }

    function spawn(isP, idx) {
        const eraIdx = isP ? state.pEra : state.eEra;
        const era = ERAS[eraIdx];
        const data = era.units[idx];
        
        if (isP) { if (state.gold < data.cost) return; state.gold -= data.cost; }

        // 調整敵方血量：前五個時代 (0,1,2,3,4) 為 80%
        let finalHp = data.hp;
        if (!isP && state.eEra <= 4) {
            finalHp = data.hp * 0.8;
        }

        const el = document.createElement('div');
        el.className = 'unit';
        el.innerHTML = `<div style="width:30px;height:4px;background:#000;margin-bottom:3px;"><div class="hpFill" style="width:100%;height:100%;background:${isP?'#2ecc71':'#e74c3c'}"></div></div><div style="font-size:35px;">${data.icon}</div>`;
        document.getElementById('battlefield').appendChild(el);

        const unit = { el, hpEl: el.querySelector('.hpFill'), pos: isP ? 100 : window.innerWidth - 130, hp: finalHp, maxHp: finalHp, dmg: data.dmg, cost: data.cost };
        if (isP) state.pUnits.push(unit); else state.eUnits.push(unit);
        updateUI();
    }

    function enemyAI() {
        if (!state.isRunning) return;
        const era = ERAS[state.eEra];
        if (state.eGold >= era.units[0].cost) spawn(false, Math.random() > 0.8 ? 1 : 0);
        state.eGold += (60 + state.eEra * 100);
        
        // 敵方自動晉升邏輯
        let evolveCost = CONFIG.evolveBase * Math.pow(3, state.eEra);
        if (state.eGold >= evolveCost && state.eEra < ERAS.length - 1) {
            state.eEra++; updateBackground();
        }
    }

    function playerEvolve() {
        let cost = Math.floor(CONFIG.evolveBase * Math.pow(3, state.pEra));
        if (state.gold >= cost && state.pEra < ERAS.length - 1) {
            state.gold -= cost; state.pEra++; updateUI(); updateBackground();
        }
    }

    function updateBackground() {
        document.getElementById('gameBg').style.backgroundImage = ERAS[Math.max(state.pEra, state.eEra)].bg;
        document.getElementById('progressDisp').innerText = `時代: ${state.pEra + 1} (${ERAS[state.pEra].name})`;
    }

    function updateUI() {
        document.getElementById('goldDisp').innerText = Math.floor(state.gold);
        document.getElementById('pBaseIcon').innerText = ERAS[state.pEra].base;
        document.getElementById('eBaseIcon').innerText = ERAS[state.eEra].base;
        const row = document.getElementById('unitRow'); row.innerHTML = '';
        ERAS[state.pEra].units.forEach((u, i) => {
            const card = document.createElement('div'); card.className = 'unitCard'; card.onclick = () => spawn(true, i);
            card.innerHTML = `<span style="font-size:30px">${u.icon}</span><span style="font-size:12px;color:#5d4037;font-weight:bold;">${u.cost}</span>`;
            row.appendChild(card);
        });
    }

    function setSpeed(v) {
        state.speed = parseFloat(v);
        startLoops();
    }

    function updateHealth() {
        document.getElementById('pHpFill').style.width = (state.pHp / CONFIG.baseHp * 100) + '%';
        document.getElementById('eHpFill').style.width = (state.eHp / CONFIG.baseHp * 100) + '%';
        if (state.pHp <= 0 || state.eHp <= 0) {
            state.isRunning = false;
            alert(state.pHp <= 0 ? "YOU LOSE" : "YOU WIN");
            location.reload();
        }
    }
</script>
</body>
</html>
