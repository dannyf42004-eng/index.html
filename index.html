<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>進化紀元：原始戰歌</title>
    <style>
        /* 全域滿版樣式 - 針對 iPhone 12 Pro Max 最佳化 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        body {
            background: #2c1e14;
            color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 滿版容器，去除黑邊 */
        #gameContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 主畫面 - 原始人主題 */
        #startMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .menuTitle {
            font-size: 48px;
            color: #f1c40f;
            text-shadow: 4px 4px 0px #7f8c8d, 0 0 20px rgba(0,0,0,0.8);
            margin-bottom: 40px;
            letter-spacing: 5px;
        }

        .startBtn {
            padding: 15px 50px;
            font-size: 24px;
            background: #e67e22;
            border: 4px solid #d35400;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 10px 0 #a04000;
            transition: 0.1s;
        }

        .startBtn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #a04000;
        }

        /* 遊戲畫布與戰場 */
        #gameCanvas {
            flex: 1;
            position: relative;
            background: #3e2723;
            overflow: hidden;
        }

        /* 頂部與底部列 - 適配 iPhone 寬螢幕 */
        #topBar, #bottomBar {
            background: rgba(44, 30, 20, 0.9);
            padding: env(safe-area-inset-top) 20px 10px 20px;
            z-index: 100;
        }

        #topBar { height: auto; display: flex; justify-content: space-between; border-bottom: 2px solid #5d4037; }
        #bottomBar { 
            height: 140px; 
            border-top: 2px solid #5d4037;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 資源顯示 */
        .resourceBox { display: flex; align-items: center; gap: 10px; font-size: 20px; color: #ffd700; }

        /* 單位列表 */
        #unitRow {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 0;
            justify-content: center;
        }

        .unitCard {
            width: 70px;
            height: 90px;
            background: #5d4037;
            border: 3px solid #3e2723;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .unitIcon { font-size: 24px; }
        .unitCost { font-size: 14px; color: #ffd700; font-weight: bold; }

        /* 戰場單位 */
        .unit {
            position: absolute;
            font-size: 30px;
            transition: left 0.1s linear, right 0.1s linear;
        }

        /* 基地 */
        .base {
            position: absolute;
            bottom: 20%;
            width: 80px;
            height: 120px;
            background: #795548;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }
        #playerBase { left: 20px; }
        #enemyBase { right: 20px; background: #8d6e63; }

        .healthBar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
        .healthFill { height: 100%; transition: width 0.3s; }
        .p-health { background: #2ecc71; }
        .e-health { background: #e74c3c; }

        .eraTag { position: absolute; top: -30px; font-size: 12px; width: 100px; text-align: center; }
    </style>
</head>
<body>

<div id="startMenu">
    <div class="menuTitle">進化紀元</div>
    <button class="startBtn" onclick="startGame()">開始遊戲</button>
</div>

<div id="gameContainer">
    <div id="topBar">
        <div class="resourceBox">🪙 <span id="goldDisplay">500</span></div>
        <div id="eraInfo">
            <span id="eraName">時代 1：石器時代</span>
            <button id="evolveBtn" onclick="playerEvolve()" style="margin-left:10px; padding: 5px 10px; background: #e67e22; border:none; border-radius:5px; color:#fff;">晉升時代 (5000)</button>
        </div>
    </div>

    <div id="gameCanvas">
        <div id="playerBase" class="base">
            <div class="eraTag" id="pEraTag">石器時代</div>
            <div class="healthBar"><div id="pHealthFill" class="healthFill p-health" style="width: 100%"></div></div>
            <div style="font-size: 40px;">🛖</div>
        </div>

        <div id="enemyBase" class="base">
            <div class="eraTag" id="eEraTag">石器時代</div>
            <div class="healthBar"><div id="eHealthFill" class="healthFill e-health" style="width: 100%"></div></div>
            <div style="font-size: 40px;">🧱</div>
        </div>
    </div>

    <div id="bottomBar">
        <div id="unitRow">
            </div>
    </div>
</div>

<script>
    // ================= 配置與數據 =================
    const CONFIG = {
        playerStartGold: 500,
        enemyStartGold: 2000,
        enemyIncomePerSec: 50,
        baseEvolveCost: 5000,
        evolveMultiplier: 6,
        baseMaxHealth: 2000
    };

    const ERAS = [
        { name: "石器時代", icon: "🛖", units: [{name: "棍棒手", cost: 50, icon: "🦴"}, {name: "投石兵", cost: 100, icon: "🪨"}] },
        { name: "青銅時代", icon: "🛡️", units: [{name: "矛兵", cost: 300, icon: "🔱"}, {name: "戰車", cost: 800, icon: "🐎"}] },
        { name: "鐵器時代", icon: "⚔️", units: [{name: "劍士", cost: 1500, icon: "🗡️"}, {name: "弩兵", cost: 3000, icon: "🏹"}] },
        { name: "中世紀", icon: "🏰", units: [{name: "騎士", cost: 10000, icon: "🏇"}, {name: "投石機", cost: 25000, icon: "☄️"}] },
        { name: "文藝復興", icon: "🎨", units: [{name: "火槍手", cost: 80000, icon: "🔫"}, {name: "加農炮", cost: 200000, icon: "💣"}] }
    ];

    let state = {
        gold: CONFIG.playerStartGold,
        eGold: CONFIG.enemyStartGold,
        pEra: 0,
        eEra: 0,
        pHealth: CONFIG.baseMaxHealth,
        eHealth: CONFIG.baseMaxHealth,
        pUnits: [],
        eUnits: [],
        isRunning: false
    };

    // ================= 核心功能 =================

    function startGame() {
        document.getElementById('startMenu').style.display = 'none';
        state.isRunning = true;
        updateUI();
        gameLoop();
        // 敵方自動生成邏輯
        setInterval(enemyAI, 1000);
        // 資源每秒增加
        setInterval(() => {
            if(!state.isRunning) return;
            state.gold += 10 + (state.pEra * 20);
            state.eGold += CONFIG.enemyIncomePerSec;
            updateUI();
        }, 1000);
    }

    function spawnUnit(isPlayer, unitIndex) {
        const era = isPlayer ? ERAS[state.pEra] : ERAS[state.eEra];
        const unitData = era.units[unitIndex];
        
        if (isPlayer) {
            if (state.gold < unitData.cost) return;
            state.gold -= unitData.cost;
        } else {
            if (state.eGold < unitData.cost) return;
            state.eGold -= unitData.cost;
        }

        const unitEl = document.createElement('div');
        unitEl.className = `unit ${isPlayer ? 'friendly' : 'enemy'}`;
        unitEl.innerHTML = unitData.icon;
        unitEl.style.bottom = '20%';
        
        const unitObj = {
            el: unitEl,
            pos: isPlayer ? 100 : (window.innerWidth - 100),
            hp: 100 * (isPlayer ? state.pEra + 1 : state.eEra + 1),
            dmg: 10 * (isPlayer ? state.pEra + 1 : state.eEra + 1),
            isPlayer: isPlayer
        };

        document.getElementById('gameCanvas').appendChild(unitEl);
        if(isPlayer) state.pUnits.push(unitObj);
        else state.eUnits.push(unitObj);
        
        updateUI();
    }

    function playerEvolve() {
        let cost = CONFIG.baseEvolveCost * Math.pow(CONFIG.evolveMultiplier, state.pEra);
        if (state.gold >= cost && state.pEra < ERAS.length - 1) {
            state.gold -= cost;
            state.pEra++;
            updateUI();
        }
    }

    function enemyAI() {
        if(!state.isRunning) return;
        
        // 自動晉升邏輯
        let nextCost = CONFIG.baseEvolveCost * Math.pow(CONFIG.evolveMultiplier, state.eEra);
        if (state.eGold >= nextCost && state.eEra < ERAS.length - 1) {
            state.eGold -= nextCost;
            state.eEra++;
        }

        // 自動生成單位 (無冷卻，只要有錢就生)
        const era = ERAS[state.eEra];
        if (state.eGold >= era.units[0].cost) {
            spawnUnit(false, 0);
        }
    }

    function gameLoop() {
        if(!state.isRunning) return;

        const moveSpeed = 2;
        
        // 我方前進
        state.pUnits.forEach((u, index) => {
            let blocked = false;
            // 檢查敵方單位或基地
            if (u.pos >= window.innerWidth - 120) {
                blocked = true;
                state.eHealth -= u.dmg / 60;
            }
            state.eUnits.forEach(e => { if(Math.abs(u.pos - e.pos) < 30) blocked = true; });
            
            if(!blocked) u.pos += moveSpeed;
            u.el.style.left = u.pos + 'px';
        });

        // 敵方前進
        state.eUnits.forEach((u, index) => {
            let blocked = false;
            if (u.pos <= 120) {
                blocked = true;
                state.pHealth -= u.dmg / 60;
            }
            state.pUnits.forEach(p => { if(Math.abs(u.pos - p.pos) < 30) blocked = true; });
            
            if(!blocked) u.pos -= moveSpeed;
            u.el.style.left = u.pos + 'px';
        });

        checkDeath();
        updateHealthBars();
        requestAnimationFrame(gameLoop);
    }

    function checkDeath() {
        if (state.pHealth <= 0 || state.eHealth <= 0) {
            state.isRunning = false;
            alert(state.pHealth <= 0 ? "你戰敗了！" : "你勝利了！");
            location.reload();
        }
    }

    function updateUI() {
        document.getElementById('goldDisplay').innerText = Math.floor(state.gold);
        document.getElementById('eraName').innerText = `時代 ${state.pEra + 1}：${ERAS[state.pEra].name}`;
        document.getElementById('pEraTag').innerText = ERAS[state.pEra].name;
        document.getElementById('eEraTag').innerText = ERAS[state.eEra].name;
        
        let evolveCost = CONFIG.baseEvolveCost * Math.pow(CONFIG.evolveMultiplier, state.pEra);
        document.getElementById('evolveBtn').innerText = `晉升時代 (${evolveCost})`;

        // 更新單位卡片
        const row = document.getElementById('unitRow');
        row.innerHTML = '';
        ERAS[state.pEra].units.forEach((u, i) => {
            const card = document.createElement('div');
            card.className = 'unitCard';
            card.onclick = () => spawnUnit(true, i);
            card.innerHTML = `<span class="unitIcon">${u.icon}</span><span class="unitCost">${u.cost}</span>`;
            row.appendChild(card);
        });
    }

    function updateHealthBars() {
        document.getElementById('pHealthFill').style.width = (state.pHealth / CONFIG.baseMaxHealth * 100) + '%';
        document.getElementById('eHealthFill').style.width = (state.eHealth / CONFIG.baseMaxHealth * 100) + '%';
    }

</script>
</body>
</html>
